{% extends "store/base.html" %}
{% block title %}Confirm delete{% endblock %}

{% block content %}
<div class="container pt-5">
  <form method="POST">
    {% csrf_token %}
    <fieldset class="form-group">
      <legend class="border-bottom mb-4">Delete Purchase</legend>
      <p class="text-danger">
        This will remove the purchase and <strong>revert stock quantities</strong>.
      </p>
      <h5>Are you sure you want to delete purchase "{{ object.slug }}"?</h5>
    </fieldset>
    <div class="form-group mt-3">
      <button class="btn btn-outline-danger btn-sm" type="submit">
        Yes, Delete
      </button>
      <a class="btn btn-outline-secondary btn-sm" href="{% url 'purchaseslist' %}">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock content %}
